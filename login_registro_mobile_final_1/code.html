<script>
        // Simple tab toggle visual logic
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');

        loginTab.onclick = () => {
            loginTab.classList.add('bg-primary', 'text-black');
            loginTab.classList.remove('text-on-surface-variant');
            signupTab.classList.remove('bg-primary', 'text-black');
            signupTab.classList.add('text-on-surface-variant');
        };

        signupTab.onclick = () => {
            signupTab.classList.add('bg-primary', 'text-black');
            signupTab.classList.remove('text-on-surface-variant');
            loginTab.classList.remove('bg-primary', 'text-black');
            loginTab.classList.add('text-on-surface-variant');
        };
